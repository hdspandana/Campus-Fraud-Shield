[theme]
base                     = "dark"
primaryColor             = "#00d4ff"
backgroundColor          = "#0a0f1e"
secondaryBackgroundColor = "#111827"
textColor                = "#e8eaf6"
font                     = "sans serif"

[server]
maxUploadSize            = 10
enableCORS               = true
enableXsrfProtection     = false
headless                 = true

[browser]
gatherUsageStats         = false

[runner]
magicEnabled             = false